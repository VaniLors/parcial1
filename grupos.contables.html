<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPOS CONTABLES</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>GRUPO CONTABLE</h2>
    </div>

    <div class="form-section">
        <div class="row">
            <label>Grupo</label>
            <input type="text" value="2">

            <label>Nombre</label>
            <select>
                <option>AUXILIARES CREADOR POR EL USUARIO</option>
            </select>
        </div>


        <div class="row">
            <label>Vida Útil</label>
            <input type="text" value="10">

            <label>Observaciones</label>
            <input type="text">
        </div>

        <div class="row checkbox">
            <label>Deprecia</label>
            <input type="checkbox" checked>
        </div>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>NOMBRE AUXILIAR</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>ALEX SANDER LOPEZ</td></tr>
                <tr><td>2</td><td></td></tr>
                <tr><td>3</td><td></td></tr>
                <tr><td>4</td><td></td></tr>
                <tr><td>5</td><td></td></tr>
                <tr><td>6</td><td></td></tr>
                <tr><td>7</td><td></td></tr>
                <tr><td>8</td><td></td></tr>
            </tbody>
        </table>
    </div>

    <div class="buttons">
        <button>Nuevo</button>
        <button>Modificar</button>
        <button>Guardar</button>
        <button>Eliminar</button>
        <button>Salir</button>
    </div>
</div>

 
</body>
</html>
